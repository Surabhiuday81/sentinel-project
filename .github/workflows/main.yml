name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Trigger on every push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Producer
        uses: docker/build-push-action@v5
        with:
          context: ./producer
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentinel-producer:latest

      - name: Build and Push Consumer
        uses: docker/build-push-action@v5
        with:
          context: ./consumer
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentinel-consumer:latest
