version: '3.8'

networks:
  frontend-nw:
  backend-nw:

services:
  broker:
    image: redis:alpine
    networks:
      - backend-nw
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  producer:
    build: ./producer
    networks:
      - frontend-nw
      - backend-nw
    depends_on:
      - broker

  consumer:
    build: ./consumer
    networks:
      - backend-nw
    depends_on:
      broker:
        condition: service_healthy

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - frontend-nw